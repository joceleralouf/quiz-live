<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Quiz Live — Hôte</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<style>
  body { overflow-y: auto; }
  .wrap { min-height: 100dvh; display: flex; flex-direction: column; padding: 24px; gap: 16px; max-width: 1100px; margin: 0 auto; width: 100%; }
  .screen.active { gap: 16px; }

  /* Éditeur */
  .q-card { display: flex; flex-direction: column; gap: 10px; }
  .q-card .row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
  .ans-row { display: grid; grid-template-columns: 34px 1fr; gap: 8px; align-items: center; }
  .ans-dot { width: 26px; height: 26px; border-radius: 8px; border: 3px solid transparent; cursor: pointer; }
  .ans-dot[data-i="0"] { background: var(--red); }
  .ans-dot[data-i="1"] { background: var(--blue); }
  .ans-dot[data-i="2"] { background: var(--yellow); }
  .ans-dot[data-i="3"] { background: var(--green); }
  .ans-dot.sel { border-color: #fff; box-shadow: 0 0 0 2px var(--bg), 0 0 0 4px #fff; }
  .toolbar { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
  .duration-input { width: 80px; }

  /* Lobby */
  #lobby { align-items: center; text-align: center; }
  #qr { background: #fff; padding: 12px; border-radius: var(--radius); }
  #players-list { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; }

  /* Question hôte */
  #h-q-text { font-size: clamp(1.6rem, 3.5vw, 2.6rem); font-weight: 800; line-height: 1.3; }
  .h-answers { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .h-ans { display: flex; align-items: center; gap: 12px; padding: 18px; border-radius: var(--radius); color: #fff; font-weight: 700; font-size: 1.2rem; }
  .h-ans[data-i="0"] { background: var(--red); }
  .h-ans[data-i="1"] { background: var(--blue); }
  .h-ans[data-i="2"] { background: var(--yellow); color: #1A1608; }
  .h-ans[data-i="3"] { background: var(--green); }
  .h-ans.dimmed { opacity: .25; }
  .h-ans .count { margin-left: auto; font-size: 1.4rem; }

  .lb-list { display: flex; flex-direction: column; gap: 8px; max-width: 520px; width: 100%; margin: 0 auto; }

  /* Podium */
  #podium-view { align-items: center; text-align: center; }
  .podium { display: flex; align-items: flex-end; gap: 14px; justify-content: center; }
  .podium .col { display: flex; flex-direction: column; gap: 8px; align-items: center; }
  .podium .bar { width: 110px; border-radius: 10px 10px 0 0; background: var(--surface-2); display: flex; align-items: flex-start; justify-content: center; padding-top: 10px; }
  .podium .p1 .bar { height: 180px; background: var(--yellow); color: #1A1608; }
  .podium .p2 .bar { height: 130px; }
  .podium .p3 .bar { height: 95px; }
</style>
</head>
<body>
<div class="wrap">

  <!-- ÉDITEUR -->
  <div id="editor" class="screen active">
    <div class="display" style="font-size:1.8rem">Créer un quiz</div>
    <input id="quiz-title" placeholder="Titre du quiz" style="max-width:420px">
    <div id="questions"></div>
    <div class="toolbar">
      <button class="btn-ghost" id="add-q">+ Ajouter une question</button>
      <button class="btn-ghost" id="export-json">Exporter JSON</button>
      <button class="btn-ghost" id="import-json">Importer JSON</button>
      <input type="file" id="import-file" accept=".json" hidden>
      <span class="muted" id="save-status"></span>
    </div>
    <div>
      <button class="btn-primary" id="create-game">Créer la partie</button>
    </div>
    <div class="err muted" id="editor-err" style="color:var(--red);font-weight:600"></div>
  </div>

  <!-- LOBBY -->
  <div id="lobby" class="screen">
    <div class="muted">Rejoignez sur <span id="join-url" style="color:var(--ink);font-weight:700"></span> avec le PIN</div>
    <div class="pin-display display" id="pin"></div>
    <div id="qr"></div>
    <div class="chip"><span id="player-count">0</span> joueur(s)</div>
    <div id="players-list"></div>
    <button class="btn-primary" id="start-game">Lancer la partie</button>
    <div class="err" id="lobby-err" style="color:var(--red);font-weight:600;min-height:1.4em"></div>
  </div>

  <!-- QUESTION -->
  <div id="h-question" class="screen">
    <div class="q-head" style="display:flex;align-items:center;gap:14px">
      <span class="chip" id="h-q-count"></span>
      <div class="timer-bar-wrap" style="flex:1"><div class="timer-bar" id="h-timer-bar"></div></div>
      <span class="timer-num display" id="h-timer-num"></span>
      <span class="chip" id="h-progress">0 réponse</span>
      <button class="btn-ghost" id="skip-q">Passer</button>
    </div>
    <div id="h-q-text"></div>
    <div class="h-answers" id="h-answers"></div>
  </div>

  <!-- CLASSEMENT INTERMÉDIAIRE -->
  <div id="h-reveal" class="screen">
    <div class="display" style="font-size:1.6rem;text-align:center">Classement</div>
    <div class="lb-list" id="lb-list"></div>
    <div style="text-align:center">
      <button class="btn-primary" id="next-q">Question suivante</button>
    </div>
  </div>

  <!-- PODIUM -->
  <div id="podium-view" class="screen">
    <div class="display" style="font-size:2rem">Podium</div>
    <div class="podium" id="podium"></div>
    <div class="lb-list" id="final-lb"></div>
    <button class="btn-ghost" onclick="location.reload()">Nouvelle partie</button>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();
const $ = id => document.getElementById(id);
const SHAPES = ['▲', '◆', '●', '■'];
let quiz = null;
let hTimerInterval = null;

function show(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  $(id).classList.add('active');
  window.scrollTo(0, 0);
}

/* ---------------- Éditeur ---------------- */
const DEMO_QUIZ = {
  title: "Spiritueux — échauffement",
  questions: [
    { text: "De quelle plante est distillé le mezcal ?", answers: ["Canne à sucre", "Agave", "Sorgho", "Cactus"], correct: 1, duration: 20 },
    { text: "Le Fernet Branca est originaire de quelle ville ?", answers: ["Turin", "Venise", "Milan", "Bologne"], correct: 2, duration: 20 },
    { text: "Laphroaig est une distillerie de quelle île écossaise ?", answers: ["Islay", "Skye", "Jura", "Orkney"], correct: 0, duration: 20 },
    { text: "Quel est le degré du Wray & Nephew Overproof ?", answers: ["57%", "60%", "63%", "69%"], correct: 2, duration: 15 },
    { text: "Le Negroni associe gin, Campari et…", answers: ["Vermouth dry", "Vermouth rouge", "Amaretto", "Cynar"], correct: 1, duration: 15 }
  ]
};

function loadDraft() {
  try {
    const d = localStorage.getItem('quizDraft');
    return d ? JSON.parse(d) : DEMO_QUIZ;
  } catch { return DEMO_QUIZ; }
}

function saveDraft() {
  localStorage.setItem('quizDraft', JSON.stringify(readEditor()));
  $('save-status').textContent = 'Brouillon sauvegardé';
  setTimeout(() => $('save-status').textContent = '', 1500);
}

function renderEditor(q) {
  $('quiz-title').value = q.title || '';
  $('questions').innerHTML = '';
  q.questions.forEach(addQuestionCard);
}

function addQuestionCard(q) {
  q = q || { text: '', answers: ['', '', '', ''], correct: 0, duration: 20 };
  const card = document.createElement('div');
  card.className = 'card q-card';
  card.innerHTML = `
    <div class="row">
      <input class="q-text" placeholder="Question" style="flex:1;min-width:220px">
      <label class="muted">Durée
        <input class="duration-input q-duration" type="number" min="5" max="120" value="${q.duration}"> s
      </label>
      <button class="btn-ghost del-q" title="Supprimer">✕</button>
    </div>
    ${[0,1,2,3].map(i => `
      <div class="ans-row">
        <div class="ans-dot" data-i="${i}" title="Marquer comme bonne réponse" role="button" tabindex="0"></div>
        <input class="q-ans" data-i="${i}" placeholder="Réponse ${SHAPES[i]}">
      </div>`).join('')}
  `;
  card.querySelector('.q-text').value = q.text;
  card.querySelectorAll('.q-ans').forEach((inp, i) => inp.value = q.answers[i] || '');
  const dots = card.querySelectorAll('.ans-dot');
  dots[q.correct].classList.add('sel');
  dots.forEach(dot => {
    const sel = () => { dots.forEach(d => d.classList.remove('sel')); dot.classList.add('sel'); saveDraft(); };
    dot.addEventListener('click', sel);
    dot.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); sel(); } });
  });
  card.querySelector('.del-q').addEventListener('click', () => { card.remove(); saveDraft(); });
  card.addEventListener('input', saveDraft);
  $('questions').appendChild(card);
}

function readEditor() {
  const questions = [...document.querySelectorAll('.q-card')].map(card => ({
    text: card.querySelector('.q-text').value.trim(),
    answers: [...card.querySelectorAll('.q-ans')].map(i => i.value.trim()),
    correct: [...card.querySelectorAll('.ans-dot')].findIndex(d => d.classList.contains('sel')),
    duration: Number(card.querySelector('.q-duration').value) || 20
  }));
  return { title: $('quiz-title').value.trim(), questions };
}

$('add-q').addEventListener('click', () => addQuestionCard());
$('quiz-title').addEventListener('input', saveDraft);

$('export-json').addEventListener('click', () => {
  const blob = new Blob([JSON.stringify(readEditor(), null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'quiz.json';
  a.click();
});
$('import-json').addEventListener('click', () => $('import-file').click());
$('import-file').addEventListener('change', e => {
  const f = e.target.files[0];
  if (!f) return;
  f.text().then(t => { renderEditor(JSON.parse(t)); saveDraft(); })
    .catch(() => $('editor-err').textContent = 'JSON invalide.');
});

renderEditor(loadDraft());

/* ---------------- Création de partie ---------------- */
$('create-game').addEventListener('click', () => {
  quiz = readEditor();
  $('editor-err').textContent = '';
  const bad = quiz.questions.some(q => !q.text || q.answers.some(a => !a));
  if (quiz.questions.length === 0 || bad) {
    $('editor-err').textContent = 'Chaque question doit avoir un texte et 4 réponses remplies.';
    return;
  }
  socket.emit('host_create', quiz, res => {
    if (res.error) { $('editor-err').textContent = res.error; return; }
    const base = location.hostname === 'localhost'
      ? `http://${res.ip}:${res.port}`
      : location.origin;
    const joinUrl = `${base}/?pin=${res.pin}`;
    $('pin').textContent = res.pin;
    $('join-url').textContent = base.replace(/^https?:\/\//, '');
    $('qr').innerHTML = '';
    if (window.QRCode) new QRCode($('qr'), { text: joinUrl, width: 190, height: 190 });
    show('lobby');
  });
});

socket.on('lobby_update', names => {
  $('player-count').textContent = names.length;
  $('players-list').innerHTML = '';
  names.forEach(n => {
    const c = document.createElement('span');
    c.className = 'chip';
    c.textContent = n;
    $('players-list').appendChild(c);
  });
});

$('start-game').addEventListener('click', () => socket.emit('host_start'));
socket.on('host_error', msg => $('lobby-err').textContent = msg);

/* ---------------- Déroulé ---------------- */
socket.on('question_start', q => {
  $('h-q-count').textContent = `${q.index + 1}/${q.total}`;
  $('h-q-text').textContent = q.text;
  $('h-progress').textContent = '0 réponse';
  const grid = $('h-answers');
  grid.innerHTML = '';
  q.answers.forEach((a, i) => {
    const div = document.createElement('div');
    div.className = 'h-ans';
    div.dataset.i = i;
    div.innerHTML = `<span>${SHAPES[i]}</span><span class="txt"></span><span class="count"></span>`;
    div.querySelector('.txt').textContent = a;
    grid.appendChild(div);
  });
  const bar = $('h-timer-bar');
  bar.classList.remove('running');
  void bar.offsetWidth;
  bar.style.animationDuration = q.duration + 's';
  bar.classList.add('running');
  clearInterval(hTimerInterval);
  let left = q.duration;
  $('h-timer-num').textContent = left;
  hTimerInterval = setInterval(() => {
    left--;
    $('h-timer-num').textContent = Math.max(0, left);
    if (left <= 0) clearInterval(hTimerInterval);
  }, 1000);
  show('h-question');
});

socket.on('answer_progress', p => {
  $('h-progress').textContent = `${p.answered}/${p.total} réponses`;
});

$('skip-q').addEventListener('click', () => socket.emit('host_skip'));

socket.on('question_end', data => {
  clearInterval(hTimerInterval);
  // révéler la bonne réponse + répartition sur l'écran question, 3s, puis classement
  document.querySelectorAll('.h-ans').forEach((el, i) => {
    el.querySelector('.count').textContent = data.answersCount[i];
    if (i !== data.correctIndex) el.classList.add('dimmed');
  });
  setTimeout(() => {
    $('lb-list').innerHTML = '';
    data.leaderboard.forEach((p, i) => {
      const row = document.createElement('div');
      row.className = 'lb-row';
      row.innerHTML = `<span><span class="pos">${i + 1}</span> <span class="nm"></span></span><span>${p.score} pts</span>`;
      row.querySelector('.nm').textContent = p.name;
      $('lb-list').appendChild(row);
    });
    $('next-q').textContent = data.isLast ? 'Voir le podium' : 'Question suivante';
    show('h-reveal');
  }, 3000);
});

$('next-q').addEventListener('click', () => socket.emit('host_next'));

socket.on('game_over', data => {
  const order = [1, 0, 2]; // 2e, 1er, 3e
  $('podium').innerHTML = '';
  order.forEach(pos => {
    const p = data.podium[pos];
    if (!p) return;
    const col = document.createElement('div');
    col.className = `col p${pos + 1}`;
    col.innerHTML = `<div class="chip nm"></div><div class="bar display">${pos + 1}</div><div class="muted">${p.score} pts</div>`;
    col.querySelector('.nm').textContent = p.name;
    $('podium').appendChild(col);
  });
  $('final-lb').innerHTML = '';
  data.leaderboard.forEach((p, i) => {
    const row = document.createElement('div');
    row.className = 'lb-row';
    row.innerHTML = `<span><span class="pos">${i + 1}</span> <span class="nm"></span></span><span>${p.score} pts</span>`;
    row.querySelector('.nm').textContent = p.name;
    $('final-lb').appendChild(row);
  });
  show('podium-view');
});
</script>
</body>
</html>
